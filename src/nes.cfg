MEMORY {
    HEADER: start = $0000, size = $0010, type = ro, file = %O, fill = yes;
    ZP:     start = $00,   size = $0100, type = rw, define = yes;
    RAM:    start = $0300, size = $0500, type = rw, define = yes;
    ROM:    start = $8000, size = $8000, type = ro, file = %O, fill = yes, fillval = $00;
    CHRROM: start = $0000, size = $2000, type = ro, file = %O, fill = yes;
}

SEGMENTS {
    HEADER:   load = HEADER, type = ro;
    STARTUP:  load = ROM,    type = ro;
    CODE:     load = ROM,    type = ro;
    RODATA:   load = ROM,    type = ro;
    DATA:     load = ROM,    run = RAM, type = ro, define = yes;
    ONCE:     load = ROM,    type = ro;
    ZEROPAGE: load = ZP,     type = zp;
    BSS:      load = RAM,    type = bss, define = yes;
    VECTORS:  load = ROM,    type = ro, start = $FFFA;
    CHR:      load = CHRROM, type = ro;
}

FEATURES {
    CONDES:    type = constructor, label = __CONSTRUCTOR_TABLE__, count = __CONSTRUCTOR_COUNT__, segment = ONCE;
    CONDES:    type = destructor,  label = __DESTRUCTOR_TABLE__,  count = __DESTRUCTOR_COUNT__,  segment = ONCE;
    CONDES:    type = interruptor, label = __INTERRUPTOR_TABLE__, count = __INTERRUPTOR_COUNT__, segment = RODATA;
}

SYMBOLS {
    __STACKSIZE__:  type = export, value = $0100;
    NES_MAPPER:     type = export, value = 0;
    NES_PRG_BANKS:  type = export, value = 2;
    NES_CHR_BANKS:  type = export, value = 1;
    NES_MIRRORING:  type = export, value = 0;
}
